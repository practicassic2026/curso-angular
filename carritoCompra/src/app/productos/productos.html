<div class="encabezado"> 
    <h1 style="text-align: center;"> PRODUCTOS </h1>

    <div class="a">
        <table>
            <thead>
                <tr>
                <th style="width:10%;">ID</th>
                <th style="width:70%;">Nombre del producto</th>
                <th style="width:20%;">Precio</th>
                </tr>
            </thead>

            <tbody>
                @for(producto of Productos; track producto){
                    <tr>
                        <td>{{producto.id}}</td>
                        <td>{{producto.nombre}}</td>
                        <td>
                            <div class="precio-btn">
                            <span>{{producto.precio}} €</span>
                            <button class="del" (click)="deleteProduct(producto.id)">-</button>
                            </div>
                        </td>
                    </tr>
                }
            </tbody>
        </table>
        
    </div>

    <div class="form">
        Nombre del producto: <input type="text" [(ngModel)]="nombre">
        Precio: <input type="number" [(ngModel)]="precio">
       <button (click)="createProduct(nombre, precio)">Crear producto</button>
    </div>

</div>
