<div class="tabla-productos">



  <!-- Filas -->
    <div class="fila">
      <span >{{producto.id}}</span>
      <span (click)="goUpdateProducto(producto.id)">{{producto.nombre}}</span>
      <span>{{producto.precio}} €</span>

      <button class="add" (click)="addToCarrito($event)">
        Añadir al carrito
      </button>
    </div>
</div>
