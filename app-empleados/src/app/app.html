<div class="container mt-4">
  <!-- Título -->
  <h1 class="text-center fw-bold">{{titulo}}</h1>

  <!-- Formulario -->
  <div class="row mt-4 mb-3 g-3">
    <div class="col-md-3">
      <label for="nombre" class="form-label">Nombre</label>
      <input type="text" id="nombre" #nombre class="form-control">
    </div>
    <div class="col-md-3">
      <label for="apellido" class="form-label">Apellido</label>
      <input type="text" id="apellido" #apellido class="form-control">
    </div>
    <div class="col-md-3">
      <label for="cargo" class="form-label">Cargo</label>
      <input type="text" id="cargo" #cargo class="form-control">
    </div>
    <div class="col-md-3">
      <label for="salario" class="form-label">Salario</label>
      <input type="number" id="salario" #salario class="form-control">
    </div>
  </div>

  <!-- Botón -->
  <div class="mb-4">
    <button class="btn btn-primary" 
            (click)="InsertarEmpleado(nombre.value, apellido.value, cargo.value, salario.valueAsNumber)">
      Insertar
    </button>
  </div>

      @for (empleado of empleados; track empleado){
        <app-empleado-hijo-c [empleado]="empleado" [indic] = "$index">

        </app-empleado-hijo-c>
      }
